<!-- layouts/_default/list.html -->
{{ define "main" }}
<div class="max-w-2xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold text-slate-900 mb-8">{{ .Title }}</h1>
  {{ if .Pages }}
    <ul class="space-y-8">
      {{ range .Pages.ByDate.Reverse }}
        <li class="border-b border-slate-100 pb-8">
          <a href="{{ .RelPermalink }}" class="group block">
            <h2 class="text-xl font-semibold text-slate-900 group-hover:text-teal-700 transition-colors">{{ .Title }}</h2>
            <p class="text-sm text-slate-500 mt-1">{{ .Date.Format "02 January 2006" }}</p>
            {{ with .Summary }}<p class="text-slate-600 mt-2 text-sm">{{ . }}</p>{{ end }}
          </a>
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p class="text-slate-500">Nessun contenuto in questa sezione.</p>
  {{ end }}
</div>
{{ end }}
