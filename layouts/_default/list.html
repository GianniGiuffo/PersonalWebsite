{{ define "main" }}
<div class="max-w-2xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-8">{{ .Title }}</h1>
  {{ if .Pages }}
    <ul class="space-y-0 divide-y divide-slate-100 dark:divide-slate-800">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}" class="group flex items-start justify-between gap-4 py-5 hover:bg-slate-50 dark:hover:bg-slate-800/50 -mx-3 px-3 rounded-lg transition-colors">
            <div class="flex-1 min-w-0">
              <h2 class="text-base font-semibold text-slate-900 dark:text-slate-100 group-hover:text-teal-700 dark:group-hover:text-teal-400 transition-colors">{{ .Title }}</h2>
              {{ with .Summary }}<p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">{{ . }}</p>{{ end }}
            </div>
            <time class="text-xs text-slate-400 dark:text-slate-500 flex-shrink-0 mt-1">{{ .Date.Format "02 Jan 2006" }}</time>
          </a>
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p class="text-slate-500 dark:text-slate-400">{{ i18n "noContent" }}</p>
  {{ end }}
</div>
{{ end }}
