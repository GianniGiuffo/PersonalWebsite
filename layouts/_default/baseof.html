<!-- layouts/_default/baseof.html -->
<!doctype html>
<html lang="{{ .Site.Language.Locale }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

  {{ with (templates.Defer (dict "key" "global")) }}
    {{ partial "css.html" . }}
  {{ end }}

  {{ range hugo.Data.fonts }}
    {{ $font := . }}
    {{ with $font.file }}
      <style>
        @font-face {
          font-family: '{{ $font.family }}';
          src: url('{{ . }}') format('woff2');
          font-weight: {{ $font.weight | default "400" }};
          font-style: normal;
          font-display: swap;
        }
      </style>
    {{ end }}
  {{ end }}

  <script>
    (function(){
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');

    })();
  </script>

</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
