{{ define "main" }}
<div class="max-w-2xl mx-auto px-4 py-12">

  <!-- Back link -->
  <div class="mb-8">
    <a href="/posts/" class="inline-flex items-center gap-1.5 text-sm text-slate-500 dark:text-slate-400 hover:text-teal-700 dark:hover:text-teal-400 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
      Tutti i post
    </a>
  </div>

  <!-- Header -->
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-3">{{ .Title }}</h1>
    <div class="flex items-center gap-3 text-sm text-slate-500 dark:text-slate-400">
      <time>{{ .Date.Format "02 January 2006" }}</time>
      {{ with .Params.tags }}
        <span class="text-slate-300 dark:text-slate-600">·</span>
        <div class="flex flex-wrap gap-1.5">
          {{ range . }}
            <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs px-2 py-0.5 rounded-full">{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </header>

  <!-- Content -->
  <div class="prose prose-slate dark:prose-invert max-w-none">
    {{ .Content }}
  </div>

  <!-- Footer nav -->
  <div class="mt-12 pt-6 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between text-sm">
    {{ with .PrevInSection }}
      <a href="{{ .RelPermalink }}" class="flex items-center gap-1.5 text-slate-500 dark:text-slate-400 hover:text-teal-700 dark:hover:text-teal-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        {{ .Title }}
      </a>
    {{ else }}
      <span></span>
    {{ end }}
    {{ with .NextInSection }}
      <a href="{{ .RelPermalink }}" class="flex items-center gap-1.5 text-slate-500 dark:text-slate-400 hover:text-teal-700 dark:hover:text-teal-400 transition-colors">
        {{ .Title }}
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </a>
    {{ else }}
      <span></span>
    {{ end }}
  </div>

</div>
{{ end }}
