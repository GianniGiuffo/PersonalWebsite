{{ define "main" }}
<div id="private-gate" style="display:none">
  <div class="max-w-5xl mx-auto px-4 py-12">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">{{ .Title }}</h1>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Area ad accesso riservato</p>
      </div>
      <button id="private-logout-btn"
              class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        Logout
      </button>
    </div>

    {{ .Content }}

    {{ if .Pages }}
    <div class="grid gap-4 mt-8">
      {{ range .Pages }}
      <article class="rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-5 hover:shadow-md transition-shadow">
        <h2 class="font-semibold text-slate-900 dark:text-slate-100">
          <a href="{{ .Permalink }}" class="hover:text-teal-600 dark:hover:text-teal-400 transition-colors">{{ .Title }}</a>
        </h2>
        {{ if .Summary }}
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">{{ .Summary }}</p>
        {{ end }}
      </article>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>

<!-- Schermata di accesso negato (visibile finché JS non verifica il token) -->
<div id="private-denied" class="max-w-5xl mx-auto px-4 py-24 text-center">
  <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="1.5"
       stroke-linecap="round" stroke-linejoin="round"
       class="mx-auto mb-4 text-slate-400 dark:text-slate-500">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
  <h1 class="text-xl font-semibold text-slate-700 dark:text-slate-300 mb-2">Area riservata</h1>
  <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Devi effettuare il login per accedere a questa sezione.</p>
  <button id="private-login-btn"
          class="px-4 py-2 rounded-md bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium transition-colors">
    Accedi
  </button>
</div>

<script>
(function () {
  var gate    = document.getElementById('private-gate');
  var denied  = document.getElementById('private-denied');
  var loginBtn  = document.getElementById('private-login-btn');
  var logoutBtn = document.getElementById('private-logout-btn');

  function waitForIdentity(cb) {
    if (window.netlifyIdentity) { cb(); }
    else {
      var t = setInterval(function () {
        if (window.netlifyIdentity) { clearInterval(t); cb(); }
      }, 50);
    }
  }

  waitForIdentity(function () {
    window.netlifyIdentity.on('init', function (user) {
      if (user) {
        gate.style.display   = 'block';
        denied.style.display = 'none';
      } else {
        gate.style.display   = 'none';
        denied.style.display = 'block';
      }
    });

    window.netlifyIdentity.on('login', function () {
      window.netlifyIdentity.close();
      gate.style.display   = 'block';
      denied.style.display = 'none';
    });

    window.netlifyIdentity.on('logout', function () {
      gate.style.display   = 'none';
      denied.style.display = 'block';
    });

    if (loginBtn) {
      loginBtn.addEventListener('click', function () {
        window.netlifyIdentity.open('login');
      });
    }

    if (logoutBtn) {
      logoutBtn.addEventListener('click', function () {
        window.netlifyIdentity.logout();
      });
    }
  });
})();
</script>
{{ end }}
