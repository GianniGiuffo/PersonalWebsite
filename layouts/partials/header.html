<header class="sticky top-0 z-50 border-b border-slate-200 dark:border-slate-700 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm">
  <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between gap-4">

    <!-- Sinistra: navigazione principale -->
    <nav class="flex items-center gap-1">
      <a href="/"
         class="px-3 py-1.5 rounded-md text-sm font-semibold text-slate-900 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
         aria-label="Homepage">
        Home
      </a>
      <a href="/posts/"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        Posts
      </a>
      <a href="/projects/"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        Projects
      </a>
    </nav>

    <!-- Destra: avatar, contatti, tema -->
    <div class="flex items-center gap-2">

      <!-- Avatar rotondo → pagina profilo -->
      <a href="/about/"
         class="flex-shrink-0 w-8 h-8 rounded-full overflow-hidden ring-2 ring-slate-200 dark:ring-slate-700 hover:ring-teal-500 dark:hover:ring-teal-400 transition-all"
         aria-label="Profilo">
        <img src="/img/avatar.jpg"
             alt="Tommaso Francescon"
             width="32" height="32"
             class="w-full h-full object-cover"
             onerror="this.onerror=null;this.src='';this.parentElement.innerHTML='<span class=&quot;w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold&quot;>TF</span>'">
      </a>

      <!-- Bottone Contatti -->
      <a href="/contact/"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        Contatti
      </a>

      <!-- Toggle tema chiaro/scuro -->
      <button id="theme-toggle"
              aria-label="Cambia tema"
              class="w-8 h-8 flex items-center justify-center rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <!-- Sole (mostrato in dark mode) -->
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <!-- Luna (mostrata in light mode) -->
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<script>
  (function() {
    const btn = document.getElementById('theme-toggle');
    const sun = document.getElementById('icon-sun');
    const moon = document.getElementById('icon-moon');
    const html = document.documentElement;

    function applyTheme(theme) {
      if (theme === 'dark') {
        html.classList.add('dark');
        html.setAttribute('data-theme', 'dark');
        sun.classList.remove('hidden');
        moon.classList.add('hidden');
      } else {
        html.classList.remove('dark');
        html.setAttribute('data-theme', 'light');
        sun.classList.add('hidden');
        moon.classList.remove('hidden');
      }
      localStorage.setItem('theme', theme);
    }

    // Init icone in base al tema corrente
    const current = html.getAttribute('data-theme') || 'light';
    applyTheme(current);

    btn.addEventListener('click', function() {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    });
  })();
</script>
