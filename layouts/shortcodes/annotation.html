{{/*
  Shortcode: annotation
  Uso: {{< annotation >}}Testo nota{{< /annotation >}}

  Desktop: nota a destra del body, fuori dal flusso.
  Mobile: pulsante asterisco che apre un alert nativo.
*/}}
{{- $text := .Inner | markdownify | plainify -}}
<span class="annotation-wrap"><button
  class="annotation-marker"
  onclick="alert({{ $text | jsonify }})"
  aria-label="Annotazione"
  type="button">*</button><span class="annotation-note" aria-hidden="true">{{ .Inner | markdownify }}</span></span>
