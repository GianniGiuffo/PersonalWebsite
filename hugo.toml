baseURL = 'https://personalwebsite-gg.netlify.app/'
locale   = 'it-IT'
title    = 'Tommaso Francescon'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ['json']

[outputFormats]
  [outputFormats.JSON]
    mediaType      = "application/json"
    baseName       = "index"
    isHTML         = false
    notAlternative = true

[build]
  [build.buildStats]
    enable = true

  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'archetypes'
    target = 'archetypes'

  [[module.mounts]]
    source = 'assets'
    target = 'assets'

  [[module.mounts]]
    source = 'content'
    target = 'content'

  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'

  [[module.mounts]]
    source = 'static'
    target = 'static'

  [[module.mounts]]
    source = 'i18n'
    target = 'i18n'

  [[module.mounts]]
    source = 'data'
    target = 'data'

  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
