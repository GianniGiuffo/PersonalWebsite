baseURL = 'https://tommasofrancescon.it/'
defaultContentLanguage = 'it'
defaultContentLanguageInSubdir = false
title = 'Tommaso Francescon'

[params]
  # URL MagicDNS dell'area privata, es. https://server.tua-tailnet.ts.net/private/
  # Rimane vuoto finché Tailscale Serve non viene configurato sul server.
  privateURL = ''

[languages]
  [languages.it]
    locale = 'it-IT'
    label = 'Italiano'
    weight = 1

  [languages.en]
    locale = 'en-US'
    label = 'English'
    weight = 2

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ['json']

[outputFormats]
  [outputFormats.JSON]
    mediaType      = "application/json"
    baseName       = "index"
    isHTML         = false
    notAlternative = false

[build]
  [build.buildStats]
    enable = true

  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'archetypes'
    target = 'archetypes'

  [[module.mounts]]
    source = 'assets'
    target = 'assets'

  [[module.mounts]]
    source = 'content/italian'
    target = 'content'
    [module.mounts.sites.matrix]
      languages = ['it']

  [[module.mounts]]
    source = 'content/english'
    target = 'content'
    [module.mounts.sites.matrix]
      languages = ['en']

  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'

  [[module.mounts]]
    source = 'static'
    target = 'static'

  [[module.mounts]]
    source = 'i18n'
    target = 'i18n'

  [[module.mounts]]
    source = 'data'
    target = 'data'

  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
